<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱😽 Momo 雲端管家</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff9a9e; --bg: #fff5f5; --text: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #ff6b81; margin-bottom: 5px; font-size: 1.6em; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; margin-top: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; background: #eee; font-weight: bold; font-size: 0.95em; }
        .tab-btn.active { background: #ff6b81; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section { background: #fff9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .row-inputs { display: flex; gap: 5px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; width: 100%; box-sizing: border-box; }
        button { background: #ff6b81; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; margin-top: 5px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: white; padding: 10px; margin-top: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 0.95em; }
        .history-card { border: 1px solid #eee; padding: 12px; border-radius: 12px; margin-bottom: 10px; font-size: 0.95em; background: #fafafa; }
        .status-bar { text-align: center; font-size: 0.85em; color: #666; background: #f0f0f0; padding: 6px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        .calc-preview { font-size: 0.82em; color: #888; margin-top: 2px; line-height: 1.3; }
        
        .med-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 8px; overflow: hidden; }
        .med-table th, .med-table td { border: 1px solid #eee; padding: 10px 5px; text-align: center; font-size: 0.9em; }
        .med-table th { background: #ffeaeae7; color: #ff6b81; font-weight: bold; }
        .med-table td:first-child { font-weight: bold; color: #444; text-align: left; padding-left: 10px; }
        .med-btn { border: none; padding: 6px 8px; border-radius: 6px; font-size: 0.8em; font-weight: bold; cursor: pointer; width: 100%; box-sizing: border-box; }
        .med-btn.yes { background: #badc58; color: #333; }
        .med-btn.no { background: #ffeaa7; color: #d63031; }
        .med-btn.disabled { background: #f5f5f5; color: #bbb; cursor: not-allowed; }
        
        .chart-container { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 12px; margin-bottom: 15px; position: relative; width: 100%; box-sizing: border-box; }
        .sync-btn { background: #6ab04c; margin-bottom: 15px; }
        .time-badge { font-size: 0.75em; background: #eee; padding: 2px 6px; border-radius: 4px; color: #666; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐱😽 Momo 雲端管家</h1>
    <div id="syncStatus" class="status-bar">🔄 正在載入雲端同步數據...</div>
    
    <button class="sync-btn" onclick="syncAllFromCloud()">🔄 點擊刷新/同步全家人數據</button>

    <div class="chart-container">
        <canvas id="kcalChart" style="width:100%; height:190px;"></canvas>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('today')">今日紀錄</button>
        <button class="tab-btn" onclick="switchTab('history')">歷史回顧 📜</button>
    </div>

    <div id="todayTab" class="tab-content active">
        <p id="displayDate" style="text-align:center; color:#555; font-weight: bold; margin-bottom: 15px;"></p>
        
        <div class="section">
            <h3>🍖 飲食紀錄 (記錄時間與食物含水)</h3>
            <div class="input-group">
                <select id="foodSelect" onchange="updateCalcPreview()">
                    <option value="吱吱/腎活" data-ratio="1.0" data-water="0.8">吱吱/腎活 (1 kcal/g | 80%水)</option>
                    <option value="Reco" data-ratio="1.9" data-water="0.75">Reco (1.9 kcal/ml | 75%水)</option>
                    <option value="RC" data-ratio="1.0" data-water="0.8">RC (1.0 kcal/ml | 80%水)</option>
                    <option value="Others (0.5kcal/g)" data-ratio="0.5" data-water="0.8">Others (0.5 kcal/g | 80%水)</option>
                </select>
                <div class="row-inputs">
                    <input type="number" id="foodAmount" placeholder="輸入餵食量 (g/ml)" oninput="updateCalcPreview()">
                    <div id="calcPreview" class="calc-preview" style="align-self: center; font-weight: bold; color: #777; padding-left:5px;">= 0 kcal<br>💧 +0 ml 水</div>
                </div>
                <button onclick="addFood()">新增飲食紀錄</button>
            </div>
            <ul id="foodList"></ul>
            <p style="text-align:right; font-weight:bold; color: #ff6b81; font-size: 1.05em; margin-top: 10px;">今日飲食總計: <span id="totalCal">0</span> kcal</p>
        </div>

        <div class="section" style="border-left: 5px solid #74b9ff; background: #f2f7ff;">
            <h3>💧 額外補充水份 (直接喝水 / 皮下水)</h3>
            <div class="input-group">
                <select id="waterType">
                    <option value="直接喝水">💧 直接喝水 (ml)</option>
                    <option value="皮下水">💉 皮下水 (ml)</option>
                </select>
                <div class="row-inputs">
                    <input type="number" id="waterAmount" placeholder="輸入補水量 (ml)">
                </div>
                <button onclick="addWater()" style="background: #0984e3;">新增水份紀錄</button>
            </div>
            <ul id="waterList"></ul>
            <p style="text-align:right; font-weight:bold; color: #0984e3; font-size: 1.1em; margin-top: 10px;">
                今日【總攝水量】: <span id="grandTotalWater">0</span> ml
            </p>
            <p style="text-align:right; font-size:0.8em; color:#666; margin-top:-5px;">(已自動加總食物含水)</p>
        </div>

        <div class="section">
            <h3>💊 今日處方藥物進度表</h3>
            <table class="med-table">
                <thead>
                    <tr>
                        <th style="width: 34%;">藥物名稱</th>
                        <th style="width: 22%;">早上</th>
                        <th style="width: 22%;">夜晚</th>
                        <th style="width: 22%;">需要時</th>
                    </tr>
                </thead>
                <tbody id="medTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="historyTab" class="tab-content">
        <h3>📊 Google Sheet 雲端歷史紀錄</h3>
        <div id="historyList">讀取中...</div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby7j28L5dYQa6AiNpj2xhRE4OQBm41VoSelsAmNlBf9AgSEswaloe6GZst7az8S50PhJw/exec';

    const MED_TEMPLATES = [
        { name: "Rapros", morning: true, night: true, inNeed: false },
        { name: "K",      morning: true, night: true, inNeed: false },
        { name: "BP",     morning: true, night: true, inNeed: false },
        { name: "開胃",   morning: false, night: false, inNeed: true },
        { name: "止痛",   morning: false, night: false, inNeed: true }
    ];

    let foodData = [];
    let waterData = []; // 儲存直接喝水與皮下水
    let medState = MED_TEMPLATES.map(m => ({ name: m.name, morningTaken: false, nightTaken: false, inNeedCount: 0 }));
    let historyData = []; 
    let lastActiveDate = localStorage.getItem('momo_last_date');
    let myChart = null; 

    function formatToMomoDate(dateInput) {
        try {
            const d = new Date(dateInput);
            if (isNaN(d.getTime())) return dateInput; 
            const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return `${weekdays[d.getDay()]} ${String(d.getDate()).padStart(2, '0')}-${months[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`;
        } catch(e) { return dateInput; }
    }

    function updateCalcPreview() {
        const select = document.getElementById('foodSelect');
        const ratio = parseFloat(select.options[select.selectedIndex].getAttribute('data-ratio'));
        const waterRatio = parseFloat(select.options[select.selectedIndex].getAttribute('data-water'));
        const amount = parseFloat(document.getElementById('foodAmount').value) || 0;
        
        const kcal = (amount * ratio).toFixed(1);
        const water = (amount * waterRatio).toFixed(1);
        document.getElementById('calcPreview').innerHTML = `= ${kcal} kcal<br>💧 +${water} ml 水`;
    }

    async function syncAllFromCloud() {
        document.getElementById('syncStatus').innerText = "🔄 正在同步全家人數據...";
        const now = new Date();
        const currentDateStr = now.toLocaleDateString('zh-HK'); 
        document.getElementById('displayDate').innerText = "今日日期: " + currentDateStr;

        if (lastActiveDate && lastActiveDate !== currentDateStr) {
            await archiveDayToCloud(lastActiveDate);
            lastActiveDate = currentDateStr;
            localStorage.setItem('momo_last_date', lastActiveDate);
        }

        try {
            let resToday = await fetch(`${GOOGLE_SCRIPT_URL}?action=getToday`);
            let cloudToday = await resToday.json();
            foodData = cloudToday.food || [];
            waterData = cloudToday.water || [];
            
            if (cloudToday.meds && cloudToday.meds.length === medState.length) {
                medState = cloudToday.meds;
            } else {
                medState = MED_TEMPLATES.map(m => ({ name: m.name, morningTaken: false, nightTaken: false, inNeedCount: 0 }));
            }

            let resHistory = await fetch(`${GOOGLE_SCRIPT_URL}?action=read`);
            let rawData = await resHistory.json();
            rawData.sort((a, b) => new Date(b.date) - new Date(a.date));
            historyData = rawData.map(item => { item.formattedDate = formatToMomoDate(item.date); return item; });

            renderTodayData();
            renderHistoryData();
            updateChart();
            document.getElementById('syncStatus').innerText = "✅ 全家數據已實時同步";
        } catch (e) {
            document.getElementById('syncStatus').innerText = "⚠️ 連線失敗，請點擊上方綠色按鈕重試";
        }
    }

    async function pushTodayToCloud() {
        const totalCal = foodData.reduce((s, i) => s + i.cal, 0);
        // 計算總攝水量 = 食物含水量總和 + 額外補水量總和
        const foodWaterTotal = foodData.reduce((s, i) => s + (i.water || 0), 0);
        const extraWaterTotal = waterData.reduce((s, i) => s + i.amount, 0);
        const totalWater = (foodWaterTotal + extraWaterTotal).toFixed(1);

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "updateToday", totalCal, food: foodData, meds: medState, totalWater, water: waterData })
            });
            document.getElementById('syncStatus').innerText = "✅ 數據已實時推送到雲端";
        } catch(e) {
            document.getElementById('syncStatus').innerText = "⚠️ 傳送失敗，請點擊上方按鈕刷新";
        }
    }

    async function archiveDayToCloud(oldDate) {
        if (foodData.length > 0 || waterData.length > 0 || medState.some(m => m.morningTaken || m.nightTaken || m.inNeedCount > 0)) {
            const totalCal = foodData.reduce((s, i) => s + i.cal, 0);
            const foodWaterTotal = foodData.reduce((s, i) => s + (i.water || 0), 0);
            const extraWaterTotal = waterData.reduce((s, i) => s + i.amount, 0);
            const totalWater = (foodWaterTotal + extraWaterTotal).toFixed(1);

            const details = foodData.map(f => `${f.time || ''} ${f.name}[${f.amount}g/ml](${f.cal}kcal)`).join(', ') || '無紀錄';
            const waterDetails = waterData.map(w => `${w.time || ''} ${w.type}[${w.amount}ml]`).join(', ') || '無紀錄';
            
            const medsText = medState.map(m => {
                let parts = [];
                const template = MED_TEMPLATES.find(t => t.name === m.name);
                if (template.morning) parts.push(`早:${m.morningTaken ? '✅':'❌'}`);
                if (template.night) parts.push(`夜:${m.nightTaken ? '✅':'❌'}`);
                if (template.inNeed) parts.push(`需:${m.inNeedCount}次`);
                return `${m.name}(${parts.join(',')})`;
            }).join(' | ');

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "archive", date: oldDate, details, meds: medsText, totalWater, waterDetails: `食物含水:${foodWaterTotal.toFixed(1)}ml, ${waterDetails}` })
                });
            } catch (e) { console.error(e); }
        }
        foodData = [];
        waterData = [];
        medState = MED_TEMPLATES.map(m => ({ name: m.name, morningTaken: false, nightTaken: false, inNeedCount: 0 }));
    }

    function updateChart() {
        const ctx = document.getElementById('kcalChart').getContext('2d');
        let chartData = [...historyData].reverse(); 
        if(chartData.length > 30) chartData = chartData.slice(-30); 
        const labels = chartData.map(h => {
            const parts = h.formattedDate.split(' ');
            return parts[1] ? parts[1].replace(/-26$/, '') : h.formattedDate;
        });
        const kvals = chartData.map(h => parseFloat(h.totalCal) || 0);
        const pointColors = kvals.map(v => v >= 140 ? '#badc58' : '#ff7675');
        const pointBorderColors = kvals.map(v => v >= 140 ? '#6ab04c' : '#d63031');

        if (myChart) { myChart.destroy(); } 
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels.length ? labels : ['無數據'],
                datasets: [{
                    label: '每日卡路里',
                    data: kvals.length ? kvals : [0],
                    borderColor: '#ff9a9e',
                    borderWidth: 2.5,
                    pointBackgroundColor: pointColors,
                    pointBorderColor: pointBorderColors,
                    pointRadius: chartData.length > 15 ? 3 : 4,
                    tension: 0.15,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { min: 0, suggestedMax: 200, ticks: { stepSize: 20, color: '#666' } },
                    x: { ticks: { color: '#666', font: { size: 9 }, maxTicksLimit: 10 }, grid: { display: false } }
                }
            }
        });
    }

    async function addFood() {
        const select = document.getElementById('foodSelect');
        const name = select.value;
        const ratio = parseFloat(select.options[select.selectedIndex].getAttribute('data-ratio'));
        const waterRatio = parseFloat(select.options[select.selectedIndex].getAttribute('data-water'));
        const amount = parseFloat(document.getElementById('foodAmount').value);
        
        if (!isNaN(amount) && amount > 0) { 
            const cal = Math.round(amount * ratio * 10) / 10; 
            const water = Math.round(amount * waterRatio * 10) / 10;
            // ✅ 獲取目前餵食的精準香港時間 (HH:MM)
            const timeStr = new Date().toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            foodData.push({ name, amount, cal, water, time: timeStr }); 
            renderTodayData(); 
            document.getElementById('foodAmount').value = '';
            document.getElementById('calcPreview').innerHTML = '= 0 kcal<br>💧 +0 ml 水';
            await pushTodayToCloud(); 
        }
    }

    async function addWater() {
        const type = document.getElementById('waterType').value;
        const amount = parseFloat(document.getElementById('waterAmount').value);
        if (!isNaN(amount) && amount > 0) {
            const timeStr = new Date().toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit', hour12: false });
            waterData.push({ type, amount, time: timeStr });
            renderTodayData();
            document.getElementById('waterAmount').value = '';
            await pushTodayToCloud();
        }
    }

    async function toggleTableMed(idx, period) {
        if (period === 'morning') medState[idx].morningTaken = !medState[idx].morningTaken;
        if (period === 'night') medState[idx].nightTaken = !medState[idx].nightTaken;
        renderTodayData(); await pushTodayToCloud(); 
    }
    async function incrementInNeed(idx) { medState[idx].inNeedCount += 1; renderTodayData(); await pushTodayToCloud(); }
    async function resetInNeed(idx) { medState[idx].inNeedCount = 0; renderTodayData(); await pushTodayToCloud(); }

    function renderTodayData() {
        // 渲染食物與時間
        const fList = document.getElementById('foodList'); fList.innerHTML = '';
        let totalCal = 0;
        let foodWaterTotal = 0;
        foodData.forEach(f => { 
            totalCal += f.cal; 
            foodWaterTotal += (f.water || 0);
            fList.innerHTML += `<li><span><span class="time-badge">${f.time || ''}</span>${f.name} (${f.amount}g/ml)</span> <strong>${f.cal} kcal (💧${f.water || 0}ml)</strong></li>`; 
        });
        document.getElementById('totalCal').innerText = totalCal.toFixed(1);

        // 渲染獨立喝水/皮下水
        const wList = document.getElementById('waterList'); wList.innerHTML = '';
        let extraWaterTotal = 0;
        waterData.forEach(w => {
            extraWaterTotal += w.amount;
            const icon = w.type === '皮下水' ? '💉' : '💧';
            wList.innerHTML += `<li><span><span class="time-badge">${w.time || ''}</span>${icon} ${w.type}</span> <strong>${w.amount} ml</strong></li>`;
        });
        
        // 💥 計算並更新【總攝水量】（食物水 + 額外補水）
        document.getElementById('grandTotalWater').innerText = (foodWaterTotal + extraWaterTotal).toFixed(1);

        // 藥物表格
        const tBody = document.getElementById('medTableBody'); tBody.innerHTML = '';
        MED_TEMPLATES.forEach((m, i) => {
            let rowHtml = `<tr><td>${m.name}</td>`;
            if (m.morning) { rowHtml += `<td><button class="med-btn ${medState[i].morningTaken?'yes':'no'}" onclick="toggleTableMed(${i}, 'morning')">${medState[i].morningTaken?'✅ 已餵':'❌ 未餵'}</button></td>`; } 
            else { rowHtml += `<td><button class="med-btn disabled" disabled>-</button></td>`; }
            if (m.night) { rowHtml += `<td><button class="med-btn ${medState[i].nightTaken?'yes':'no'}" onclick="toggleTableMed(${i}, 'night')">${medState[i].nightTaken?'✅ 已餵':'❌ 未餵'}</button></td>`; } 
            else { rowHtml += `<td><button class="med-btn disabled" disabled>-</button></td>`; }
            if (m.inNeed) { rowHtml += `<td><button class="med-btn ${medState[i].inNeedCount > 0?'yes':'no'}" onclick="incrementInNeed(${i})" ondblclick="resetInNeed(${i})">${medState[i].inNeedCount > 0 ? '✅ '+medState[i].inNeedCount+' 次' : '❌ 未餵'}</button></td>`; } 
            else { rowHtml += `<td><button class="med-btn disabled" disabled>-</button></td>`; }
            rowHtml += `</tr>`; tBody.innerHTML += rowHtml;
        });
    }

    function renderHistoryData() {
        const hList = document.getElementById('historyList');
        if(historyData.length === 0) { hList.innerHTML = "<p style='color:#888;text-align:center;padding:20px;'>暫無雲端紀錄。</p>"; return; }
        hList.innerHTML = historyData.map(h => {
            const val = parseFloat(h.totalCal) || 0;
            return `
                <div class="history-card">
                    <strong>📅 ${h.formattedDate}</strong> | <span style="${val >= 140 ? 'color:#6ab04c' : 'color:#ff7675'}; font-weight:bold;">${val >= 140 ? '🟢' : '⚠️ 唔夠秤'} ${h.totalCal} kcal</span><br>
                    <div style="color:#0984e3; font-weight:bold; margin-top:3px; font-size:0.9em;">💧 總攝水量: ${h.totalWater || 0} ml</div>
                    <div style="margin-top:5px; color:#555; font-size:0.85em;">粗🍖 飲食明細: ${h.details}</div>
                    <div style="color:#555; font-size:0.85em;">細💧 水份明細: ${h.waterDetails || '無紀錄'}</div>
                    <div style="color:#555; font-size:0.82em; margin-top:3px; border-top:1px dashed #eee; padding-top:3px;">💊 藥物狀態: ${h.meds}</div>
                </div>
            `;
        }).join('');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        event.currentTarget.classList.add('active');
        if(tab === 'history') { syncAllFromCloud(); }
    }

    if (!lastActiveDate) localStorage.setItem('momo_last_date', new Date().toLocaleDateString('zh-HK'));
    syncAllFromCloud();
</script>
</body>
</html>
